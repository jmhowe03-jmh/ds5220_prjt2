apiVersion: batch/v1
kind: CronJob
metadata:
  name: weather-tracker
  namespace: default
spec:
  schedule: "*/30 * * * *"     # runs every 15 minutes
  concurrencyPolicy: Forbid    # skip a run if the previous one is still going
  successfulJobsHistoryLimit: 10
  failedJobsHistoryLimit: 10
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: iss-tracker
              image: ghcr.io/jmhowe03-jmh/
              imagePullPolicy: Always
              env:
                - name: DYNAMODB_TABLE
                  value: "weather-tracking"

                - name: S3_BUCKET
                  value: "vxx4kn-weather-bucket"

                - name: AWS_REGION
                  value: "us-east-1"